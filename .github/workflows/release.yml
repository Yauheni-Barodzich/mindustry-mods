name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Версия (пусто = авто +1 patch)"
        required: false
        type: string
      bump:
        description: "Инкремент если version пустой"
        required: false
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Resolve version
        id: meta
        shell: pwsh
        run: |
          function Get-NextSemver($current, $kind) {
            if ($current -notmatch '^(\d+)\.(\d+)\.(\d+)$') { throw "Invalid VERSION: $current" }
            $major = [int]$Matches[1]; $minor = [int]$Matches[2]; $patch = [int]$Matches[3]
            switch ($kind) {
              'major' { return '{0}.0.0' -f ($major + 1) }
              'minor' { return '{0}.{1}.0' -f $major, ($minor + 1) }
              default { return '{0}.{1}.{2}' -f $major, $minor, ($patch + 1) }
            }
          }

          $raw = "${{ github.event.inputs.version }}".Trim()
          $event = "${{ github.event_name }}"
          $bump = "${{ github.event.inputs.bump }}"
          if ([string]::IsNullOrWhiteSpace($bump)) { $bump = 'patch' }

          if ($event -eq 'workflow_dispatch') {
            if ([string]::IsNullOrWhiteSpace($raw)) {
              $pkg = Get-Content package.json -Raw -Encoding UTF8 | ConvertFrom-Json
              $current = [string]$pkg.version
              $version = Get-NextSemver $current $bump
              Write-Host "Auto-increment ($bump): $current -> $version"
            } else {
              $version = $raw -replace '^v', ''
            }
            $tag = "v$version"
          } else {
            $tag = "${{ github.ref_name }}"
            $version = $tag -replace '^v', ''
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Release $tag"

      - name: Bump versions in sources
        shell: pwsh
        run: ./dev/bump-version.ps1 -Version ${{ steps.meta.outputs.version }}

      - name: Commit version bump
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json dev/
          if (-not (git status --porcelain package.json dev/)) {
            Write-Host "Versions already match, skip commit"
            exit 0
          }
          git commit -m "chore: release ${{ steps.meta.outputs.tag }}"
          git push

      - name: Build mods
        shell: pwsh
        run: ./dev/build-all.ps1

      - name: Verify release artifacts
        shell: pwsh
        run: |
          $required = @(
            "dist/sync-admin.zip",
            "dist/dune-start.zip"
          )
          foreach ($f in $required) {
            if (-not (Test-Path $f)) { throw "Missing artifact: $f" }
          }

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/sync-admin.zip
            dist/dune-start.zip
