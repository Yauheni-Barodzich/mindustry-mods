block.dune-start-rover-factory.name = Простая мастерская
block.dune-start-rover-factory.description = Вездеходы (10 меди, 4 с, лимит 3) и дроны-камикадзе (15 свинца, 3 с, лимит 2). Без энергии. Постройка: 70 меди.

unit.dune-start-sand-rover.name = Вездеход-сборщик
unit.dune-start-sand-rover.description = Танк-сборщик (tier 2). Трюм 200, разгрузка в ядро. Уникальны скорость, добыча, прочность и руда. Износ при выгрузке. Лимит: 3.

unit.dune-start-kamikaze-drone.name = Дрон-камикадзе
unit.dune-start-kamikaze-drone.description = Летающий камикадзе. Ищет врагов у своей базы и врезается со взрывом. Лимит: 2. Стоимость: свинец.

