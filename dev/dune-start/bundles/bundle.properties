block.dune-start-rover-factory.name = Simple Workshop
block.dune-start-rover-factory.description = Builds harvester rovers (10 copper, 4 s, limit 3) and kamikaze drones (15 lead, 3 s, limit 2). No power. Build cost: 70 copper.

unit.dune-start-sand-rover.name = Harvester Rover
unit.dune-start-sand-rover.description = Tank miner (tier 2). Cargo 200, unloads at the core. Unique speed, mine rate, durability and ore target. Wears on unload. Limit: 3.

unit.dune-start-kamikaze-drone.name = Kamikaze Drone
unit.dune-start-kamikaze-drone.description = Flying suicide drone. Hunts enemies near your core and crashes with a blast. Limit: 2. Costs lead.

