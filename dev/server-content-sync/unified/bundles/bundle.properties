scs.admin.rules.hintsHint = [gray]Hover a setting for a tooltip (from Rules.java). Tap works on mobile.[]

# Tooltips — meanings from Mindustry Rules.java
scs.rules.hint.allowEditRules = Allows editing rules in-game. Essentially a cheat-mode toggle.
scs.rules.hint.infiniteResources = Sandbox: infinite resources, build range and build speed.
scs.rules.hint.pvp = PvP objective. Also enables automatic hosting behavior.
scs.rules.hint.pvpAutoPause = In PvP, pause while waiting for players.
scs.rules.hint.attackMode = Attack gamemode (destroy enemy cores).
scs.rules.hint.editor = Editor gamemode.
scs.rules.hint.waves = Whether waves can spawn at all. If false in rules.hjson, enemy waves are disabled on every map (even survival).
scs.rules.hint.waveTimer = Waves come automatically on a timer. If off, waves come when the play button is pressed.
scs.rules.hint.waveSending = Allow manually summoning the next wave with the play button.
scs.rules.hint.waitEnemies = Pause the wave timer until all enemies are destroyed.
scs.rules.hint.airUseSpawns = Air units spawn at spawn points instead of the map edge.
scs.rules.hint.wavesSpawnAtCores = On attack maps with waves, units spawn at enemy cores.
scs.rules.hint.pauseDisabled = Disables pause in singleplayer.
scs.rules.hint.canGameOver = Whether a game over can happen at all. Off = custom game-over only.
scs.rules.hint.coreCapture = Cores change teams when destroyed (capture) instead of just being destroyed.
scs.rules.hint.coreDestroyClear = Destroy every enemy block near the (enemy) core when that core dies (campaign-style).
scs.rules.hint.coreIncinerates = Cores burn excess items when full, like in the campaign.
scs.rules.hint.derelictRepair = Click derelict/abandoned blocks to repair them.
scs.rules.hint.cleanupDeadTeams = In PvP, dead teams' blocks and units become derelict automatically.
scs.rules.hint.onlyDepositCore = Players can deposit items only into the core.
scs.rules.hint.allowCoreUnloaders = Serpulo unloaders may take items from the core.
scs.rules.hint.itemDepositCooldown = Cooldown (seconds) between player item deposits.
scs.rules.hint.enemyCoreBuildRadius = No-build zone radius around enemy cores.
scs.rules.hint.polygonCoreProtection = No-build zones use the closest core (polygon) instead of a simple radius.
scs.rules.hint.placeRangeCheck = Blocks cannot be placed near blocks that are near the enemy team.
scs.rules.hint.reactorExplosions = Reactors can explode and damage other blocks.
scs.rules.hint.damageExplosions = Friendly explosions can set fire / damage other blocks.
scs.rules.hint.fire = Fire (and neoplasm spread) enabled.
scs.rules.hint.possessionAllowed = Allow manual control of units.
scs.rules.hint.schematicsAllowed = Allow placing schematics.
scs.rules.hint.ghostBlocks = Destroyed blocks leave ghosts so builders can rebuild them.
scs.rules.hint.hideSpawns = Hide unit spawn points on the map.
scs.rules.hint.randomWaveAI = Wave units target random things each wave instead of mainly cores/generators.
scs.rules.hint.fog = Fog of war: enemy units/buildings hidden unless in radar view.
scs.rules.hint.staticFog = When fog is on: enable static (black) undiscovered fog.
scs.rules.hint.lighting = Ambient lighting enabled.
scs.rules.hint.logicUnitControl = Allow logic to control units.
scs.rules.hint.logicUnitBuild = Allow units to build via logic.
scs.rules.hint.logicUnitDeconstruct = Allow units to deconstruct blocks via logic.
scs.rules.hint.worldProcessorPlayerLink = World processors can link to player structures.
scs.rules.hint.allowEditWorldProcessors = World processors can be edited and placed on this map.
scs.rules.hint.disableWorldProcessors = World processors no longer update (testing).
scs.rules.hint.allowLogicData = Allow the logic `data` instruction for world processors.
scs.rules.hint.unitCapVariable = Cores add to the unit limit.
scs.rules.hint.disableUnitCap = Disable the unit cap entirely.
scs.rules.hint.unitCap = Base unit cap (blocks can still increase it).
scs.rules.hint.unitBuildSpeedMultiplier = How fast unit factories build units.
scs.rules.hint.unitCostMultiplier = Multiplier for resources units take to build.
scs.rules.hint.unitDamageMultiplier = How much damage units deal.
scs.rules.hint.unitHealthMultiplier = How much health units start with.
scs.rules.hint.unitCrashDamageMultiplier = Unit crash damage multiplier (also compounds with unit damage).
scs.rules.hint.unitMineSpeedMultiplier = How fast units mine.
scs.rules.hint.unitFactoryActivationDelay = Global delay before unit factories activate.
scs.rules.hint.unitPayloadUpdate = EXPERIMENTAL: blocks update inside unit payloads and share power.
scs.rules.hint.unitPayloadsExplode = When a unit dies, its payload is destroy()ed.
scs.rules.hint.blockHealthMultiplier = How much health blocks start with.
scs.rules.hint.blockDamageMultiplier = How much damage blocks (turrets) deal.
scs.rules.hint.buildCostMultiplier = Multiplier for building resource cost.
scs.rules.hint.buildSpeedMultiplier = Multiplier for building speed.
scs.rules.hint.deconstructRefundMultiplier = Fraction of materials refunded when deconstructing.
scs.rules.hint.solarMultiplier = Multiplies solar panel power output.
scs.rules.hint.instantBuild = Instant construction with no place-rate limit. Experimental; may lag.
scs.rules.hint.allowEnvironmentDeconstruct = Most blocks (incl. environmental walls) can be deconstructed. Sandbox/test.
scs.rules.hint.hideBannedBlocks = Hide banned blocks from the build menu.
scs.rules.hint.blockWhitelist = bannedBlocks acts as a whitelist instead.
scs.rules.hint.unitWhitelist = bannedUnits acts as a whitelist instead.
scs.rules.hint.dropZoneRadius = Radius around enemy wave drop zones.
scs.rules.hint.waveSpacing = Time between waves in ticks (7200 ≈ 2 minutes at 60 TPS).
scs.rules.hint.initialWaveSpacing = Starting wave spacing; if ≤0, uses waveSpacing × 2.
scs.rules.hint.winWave = Wave after which the player wins. ≤0 disables.
scs.rules.hint.objectiveTimerMultiplier = Multiplier for time in timer objectives.
scs.rules.hint.dragMultiplier = Environment drag multiplier.
scs.rules.hint.showOtherTeamPings = Show pings from players on other teams.
scs.rules.hint.borderDarkness = Map borders fade into darkness. Only turn off with custom backgrounds.
scs.rules.hint.alwaysPlayMusic = Override settings to always play ambient music.
scs.rules.hint.disableMusic = Disable automatic music.
scs.rules.hint.musicVolume = Music volume multiplier (max 1).
scs.rules.hint.limitMapArea = Crop the playable map area to a rectangle.
scs.rules.hint.disableOutsideArea = Blocks outside the map area are disabled.
