# Подсказки — по смыслу из Mindustry Rules.java
scs.rules.hint.allowEditRules = Разрешает менять правила в игре. По сути чит-режим.
scs.rules.hint.infiniteResources = Песочница: бесконечные ресурсы, дальность и скорость строительства.
scs.rules.hint.pvp = Цель — PvP. Также включает поведение автохостинга.
scs.rules.hint.pvpAutoPause = В PvP ставить на паузу, пока ждут игроков.
scs.rules.hint.attackMode = Режим атаки (уничтожить ядра врага).
scs.rules.hint.editor = Режим редактора.
scs.rules.hint.waves = Можно ли вообще спавнить волны. Если false в rules.hjson — волны выключены на ВСЕХ картах (даже survival).
scs.rules.hint.waveTimer = Волны идут по таймеру. Если выкл. — волна по кнопке Play.
scs.rules.hint.waveSending = Разрешить вручную вызвать следующую волну кнопкой Play.
scs.rules.hint.waitEnemies = Паузить таймер волны, пока не убиты все враги.
scs.rules.hint.airUseSpawns = Воздушные юниты спавнятся на точках спавна, а не с края карты.
scs.rules.hint.wavesSpawnAtCores = На картах атаки с волнами юниты спавнятся у ядер врага.
scs.rules.hint.pauseDisabled = Отключает паузу в одиночной игре.
scs.rules.hint.canGameOver = Возможен ли game over вообще. Выкл. — только свои условия поражения.
scs.rules.hint.coreCapture = При уничтожении ядро меняет команду (захват), а не просто исчезает.
scs.rules.hint.coreDestroyClear = При гибели ядра уничтожаются вражеские постройки рядом (как в кампании).
scs.rules.hint.coreIncinerates = Ядро сжигает лишние предметы, когда полное (как в кампании).
scs.rules.hint.derelictRepair = Клик по заброшенным блокам чинит их.
scs.rules.hint.cleanupDeadTeams = В PvP у мёртвой команды блоки и юниты становятся заброшенными.
scs.rules.hint.onlyDepositCore = Игроки могут сдавать предметы только в ядро.
scs.rules.hint.allowCoreUnloaders = Разгрузчики Serpulo могут брать предметы из ядра.
scs.rules.hint.itemDepositCooldown = Кулдаун (сек) между сдачей предметов игроком.
scs.rules.hint.enemyCoreBuildRadius = Радиус запрета строительства вокруг ядер врага.
scs.rules.hint.polygonCoreProtection = Зоны запрета считаются по ближайшему ядру (полигон), а не простым кругом.
scs.rules.hint.placeRangeCheck = Нельзя ставить блоки рядом с блоками, близкими к вражеской команде.
scs.rules.hint.reactorExplosions = Реакторы могут взрываться и повреждать другие блоки.
scs.rules.hint.damageExplosions = «Дружественные» взрывы могут поджигать / наносить урон блокам.
scs.rules.hint.fire = Огонь (и распространение neoplasm) включены.
scs.rules.hint.possessionAllowed = Разрешить ручное управление юнитами.
scs.rules.hint.schematicsAllowed = Разрешить схемы (schematics).
scs.rules.hint.ghostBlocks = После разрушения остаются призраки блоков для перестройки.
scs.rules.hint.hideSpawns = Скрыть точки спавна юнитов на карте.
scs.rules.hint.randomWaveAI = Юниты волн выбирают случайные цели, а не в основном ядра/генераторы.
scs.rules.hint.fog = Туман войны: враги скрыты, пока не в зоне радара.
scs.rules.hint.staticFog = При тумане: чёрный «неоткрытый» статичный туман.
scs.rules.hint.lighting = Включить ambient-освещение.
scs.rules.hint.logicUnitControl = Логика может управлять юнитами.
scs.rules.hint.logicUnitBuild = Юниты могут строить через логику.
scs.rules.hint.logicUnitDeconstruct = Юниты могут разбирать блоки через логику.
scs.rules.hint.worldProcessorPlayerLink = World processor может линковаться к постройкам игроков.
scs.rules.hint.allowEditWorldProcessors = World processor можно ставить и редактировать на карте.
scs.rules.hint.disableWorldProcessors = World processor больше не тикают (для тестов).
scs.rules.hint.allowLogicData = Разрешить инструкцию `data` у world processor.
scs.rules.hint.unitCapVariable = Ядра увеличивают лимит юнитов.
scs.rules.hint.disableUnitCap = Полностью отключить лимит юнитов.
scs.rules.hint.unitCap = Базовый лимит юнитов (постройки всё ещё могут его повышать).
scs.rules.hint.unitBuildSpeedMultiplier = Скорость производства юнитов на заводах.
scs.rules.hint.unitCostMultiplier = Множитель стоимости ресурсов на юнита.
scs.rules.hint.unitDamageMultiplier = Урон юнитов.
scs.rules.hint.unitHealthMultiplier = Здоровье юнитов.
scs.rules.hint.unitCrashDamageMultiplier = Урон от крушения юнита (умножается ещё и на unit damage).
scs.rules.hint.unitMineSpeedMultiplier = Скорость добычи юнитами.
scs.rules.hint.unitFactoryActivationDelay = Глобальная задержка до активации заводов юнитов.
scs.rules.hint.unitPayloadUpdate = ЭКСПЕРИМЕНТ: блоки в payload юнита обновляются и делят энергию.
scs.rules.hint.unitPayloadsExplode = При смерти юнита его payload уничтожается через destroy().
scs.rules.hint.blockHealthMultiplier = Здоровье блоков.
scs.rules.hint.blockDamageMultiplier = Урон блоков (турелей).
scs.rules.hint.buildCostMultiplier = Множитель стоимости строительства.
scs.rules.hint.buildSpeedMultiplier = Множитель скорости строительства.
scs.rules.hint.deconstructRefundMultiplier = Доля ресурсов, возвращаемых при разборе.
scs.rules.hint.solarMultiplier = Множитель выработки солнечных панелей.
scs.rules.hint.instantBuild = Мгновенная постройка без лимита постановок/сек. Эксперимент, может лагать.
scs.rules.hint.allowEnvironmentDeconstruct = Можно разбирать почти всё, включая стены окружения. Для sandbox/тестов.
scs.rules.hint.hideBannedBlocks = Скрывать запрещённые блоки из меню строительства.
scs.rules.hint.blockWhitelist = bannedBlocks работает как белый список.
scs.rules.hint.unitWhitelist = bannedUnits работает как белый список.
scs.rules.hint.dropZoneRadius = Радиус вокруг зон высадки волн.
scs.rules.hint.waveSpacing = Интервал между волнами в тиках (7200 ≈ 2 мин при 60 TPS).
scs.rules.hint.initialWaveSpacing = Интервал до первой волны; если ≤0 — waveSpacing × 2.
scs.rules.hint.winWave = Волна, после которой победа. ≤0 — отключено.
scs.rules.hint.objectiveTimerMultiplier = Множитель времени в таймер-целях.
scs.rules.hint.dragMultiplier = Множитель сопротивления среды (drag).
scs.rules.hint.showOtherTeamPings = Показывать пинги игроков других команд.
scs.rules.hint.borderDarkness = Края карты уходят в темноту. Выключайте только с кастомным фоном.
scs.rules.hint.alwaysPlayMusic = Всегда играть ambient-музыку, игнорируя настройки.
scs.rules.hint.disableMusic = Отключить автоматическую музыку.
scs.rules.hint.musicVolume = Громкость музыки (макс. 1).
scs.rules.hint.limitMapArea = Обрезать игровую зону прямоугольником.
scs.rules.hint.disableOutsideArea = Блоки вне зоны карты отключены.
